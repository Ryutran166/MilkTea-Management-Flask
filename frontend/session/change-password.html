<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password</title>

    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <div class="change-password-container">
        <h2>Change Password</h2>

        <div id="change-password-message" style="margin: 12px 0;"></div>

        <div class="form-group">
            <label for="old_password">Old password</label>
            <input id="old_password" type="password" autocomplete="current-password" />
        </div>

        <div class="form-group">
            <label for="new_password">New password</label>
            <input id="new_password" type="password" autocomplete="new-password" />
        </div>

        <div class="form-group">
            <label for="confirm_password">Confirm password</label>
            <input id="confirm_password" type="password" autocomplete="new-password" />
        </div>

        <button onclick="changePassword()">Change Password</button>
        <button onclick="window.location.href = './profile.html'">Back</button>
    </div>

    <script src="../js/change-password.js"></script>
</body>
</html>
